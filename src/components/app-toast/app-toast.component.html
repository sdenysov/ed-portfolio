@if (toastService.toast().show) {
  <div class="validation-toast" [class.success]="toastService.toast().type === 'success'">
    <div class="toast-content">
      @if (toastService.toast().type === 'warning') {
        <img src="/images/badge-alert.svg" alt="Alert" class="toast-icon" />
      } @else {
        <img src="/images/badge-check.svg" alt="Success" class="toast-icon" />
      }
      <div class="toast-text">
        <div class="toast-title">{{ toastService.toast().title }}</div>
        <div class="toast-message">{{ toastService.toast().message }}</div>
      </div>
    </div>
  </div>
}
